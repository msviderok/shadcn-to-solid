name: Release

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    name: Verify And Pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Pack tarball
        run: |
          mkdir -p artifacts
          vp pm pack -- --pack-destination ./artifacts

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: artifacts/*.tgz
          if-no-files-found: error

  publish:
    name: Publish To npm
    needs: pack
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Publish package
        run: vp pm publish -- --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
