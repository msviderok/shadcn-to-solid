name: Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    name: Verify And Pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Pack tarball
        run: |
          mkdir -p artifacts
          vp pm pack -- --pack-destination ./artifacts

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: artifacts/*.tgz
          if-no-files-found: error

  publish:
    name: Tag And Publish
    needs: pack
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Detect release version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          current_tag="v${current_version}"

          should_release=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_release=true
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
            previous_version="$(git show "${BEFORE_SHA}:package.json" | node -e "let input=''; process.stdin.on('data', (chunk) => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version));")"
            if [ "$previous_version" != "$current_version" ]; then
              should_release=true
            fi
          fi

          tag_exists=false
          if git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            tag_exists=true
          fi

          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        if: steps.release.outputs.should_release == 'true' && steps.release.outputs.tag_exists != 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish package
        if: steps.release.outputs.should_release == 'true'
        run: vp pm publish -- --access public --no-git-checks
